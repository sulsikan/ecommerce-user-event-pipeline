global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: spark-master
    metrics_path: /metrics/master/prometheus
    static_configs:
      - targets:
          - spark-master:8080

  - job_name: spark-worker
    metrics_path: /metrics/worker/prometheus
    static_configs:
      - targets:
          - spark-worker:8081

  - job_name: spark-applications
    metrics_path: /metrics/applications/prometheus
    static_configs:
      - targets:
          - spark-master:8080

  - job_name: pushgateway
    honor_labels: true
    static_configs:
      - targets:
          - pushgateway:9091
